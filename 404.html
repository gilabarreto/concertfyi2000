<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redireciona para index.html mantendo o path e query completo
      const path = window.location.pathname;
      const search = window.location.search;
      window.location.replace('/index.html?originalPath=' + encodeURIComponent(path) + search);
    </script>
  </head>
  <body></body>
</html>
